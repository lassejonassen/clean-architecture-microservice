services:
  cleanarchitecture.webapi:
    image: ${DOCKER_REGISTRY-}cleanarchitecturewebapi
    build:
      context: .
      dockerfile: src/CleanArchitecture.WebAPI/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      
      # Mapping ConnectionStrings:Database
      - ConnectionStrings__Database=Server=sqlserver;Database=CleanArchDb;User Id=sa;Password=Your_Password123!;TrustServerCertificate=True
      
      # Mapping RabbitMq Section
      - RabbitMq__HostName=rabbitmq
      - RabbitMq__UserName=guest
      - RabbitMq__Password=guest
      - RabbitMq__ExchangeName=clean_architecture_integration_exchange
      
    depends_on:
      sqlserver:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Your_Password123!
    ports:
      - "1433:1433"
    healthcheck:
      # Added -C to trust the certificate and -t 3 for a 3-second timeout
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Your_Password123!' -Q 'SELECT 1' -b -C"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5